<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7c948">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Letter Lab">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Letter Lab</title>
    <link rel="manifest" href="manifest.webmanifest?v=31">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css?v=31">
  </head>
  <body>
    <main class="app-shell">
      <section id="matchScreen" class="screen is-active" aria-label="Matching practice">
        <section class="controls" aria-label="Practice settings">
          <div class="segmented" role="group" aria-label="Choose practice type">
            <button class="segment is-active" type="button" data-mode="letters">ABC</button>
            <button class="segment" type="button" data-mode="numbers">123</button>
            <button class="segment" type="button" data-mode="mixed">Mix</button>
          </div>
          <label class="voice-control" for="voiceSelect">
            <span>Voice</span>
            <select id="voiceSelect" aria-label="Choose speech voice">
              <option value="female">Female English</option>
              <option value="male">Male English</option>
            </select>
          </label>
        </section>

        <section class="practice-card" aria-labelledby="promptLabel">
          <div class="prompt-topline">
            <p id="promptLabel">Find this one</p>
            <button id="speakButton" class="icon-button speaker-button" type="button" aria-label="Hear the symbol again">
              <svg aria-hidden="true" viewBox="0 0 24 24" class="speaker-icon">
                <path d="M4 9v6h4l5 4V5L8 9H4Z"></path>
                <path d="M16 8.5a5 5 0 0 1 0 7"></path>
                <path d="M18.5 6a8.5 8.5 0 0 1 0 12"></path>
              </svg>
            </button>
          </div>
          <div class="target-wrap">
            <span id="targetSymbol" class="target-symbol" aria-live="polite">A</span>
          </div>
          <div class="instruction-row">
            <button id="speakInstruction" class="small-audio-button" type="button" aria-label="Hear the instructions">
              <svg aria-hidden="true" viewBox="0 0 24 24" class="speaker-icon">
                <path d="M4 9v6h4l5 4V5L8 9H4Z"></path>
                <path d="M16 8.5a5 5 0 0 1 0 7"></path>
                <path d="M18.5 6a8.5 8.5 0 0 1 0 12"></path>
              </svg>
            </button>
            <div id="feedback" class="feedback" aria-live="assertive">Tap the matching card.</div>
          </div>
        </section>

        <section class="choices" aria-label="Answer choices" id="choices"></section>

        <button id="confirmNumber" class="confirm-button" type="button" hidden>Confirm</button>

        <button id="openTrace" class="bottom-action" type="button">Practice tracing</button>
      </section>

      <section id="traceScreen" class="screen trace-screen" aria-label="Tracing practice" hidden>
        <div class="trace-header">
          <div>
            <p class="eyebrow">Trace Practice</p>
            <h2 id="traceTitle">Draw it with your finger</h2>
          </div>
          <div class="trace-tools">
            <button id="clearCanvas" class="ghost-button" type="button">Clear</button>
          </div>
        </div>
        <div class="canvas-wrap">
          <canvas id="traceCanvas" width="800" height="520" aria-label="Drawing area"></canvas>
          <span id="traceGuide" class="trace-guide" aria-hidden="true">A</span>
        </div>
        <button id="closeTrace" class="bottom-action" type="button">Back to matching</button>
      </section>
    </main>

    <script src="app.js?v=31" defer></script>
  </body>
</html>
